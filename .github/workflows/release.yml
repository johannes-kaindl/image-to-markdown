name: Release

# Baut das Plugin, erzeugt Build-Provenance-Attestations für die Release-Assets und
# veröffentlicht sie als GitHub-Release. Läuft auf der GitHub-Seite (Mirror von Codeberg):
# bei einem SemVer-Tag (ohne v-Prefix) oder manuell via workflow_dispatch.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. 0.1.3)"
        required: true

permissions:
  contents: write       # Release anlegen + Assets hochladen
  id-token: write       # OIDC für die Attestation-Signatur
  attestations: write   # Attestations schreiben

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          notes=$(awk -v t="## [$tag]" 'index($0,t)==1{f=1;next} /^## \[/{f=0} f' CHANGELOG.md)
          [ -z "$notes" ] && notes="Release $tag"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            gh release create "$tag" main.js manifest.json styles.css --title "$tag" --notes "$notes"
          fi
